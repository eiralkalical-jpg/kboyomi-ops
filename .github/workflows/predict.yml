name: Predict

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private main repo
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.TARGET_REPO }}
          ref: ${{ vars.TARGET_REF }}
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: repo
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run predict
        working-directory: repo
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          TARGET_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python -c "from pipeline.predict import run_predictions; import os; run_predictions(os.environ['TARGET_DATE'])"
          else
            python -m pipeline.predict
          fi
