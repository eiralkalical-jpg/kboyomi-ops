name: Historical Backfill

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD)'
        required: true
        type: string
      mode:
        description: 'Backfill mode'
        required: true
        default: blind_predict
        type: choice
        options:
          - blind_predict
          - finalize_results
          - refresh_reactions
      game_ids:
        description: 'Optional comma-separated DB game ids for targeted finalize/reaction refresh'
        required: false
        default: ''
        type: string
      reset_existing_artifacts:
        description: 'Clear existing predictions/reactions/community before blind rebuild'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      run_community:
        description: 'Run community scrape during blind rebuild'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: historical-backfill-${{ github.event.inputs.date }}-${{ github.event.inputs.mode }}
  cancel-in-progress: false

jobs:
  historical-backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run historical backfill
        run: >
          python pipeline/historical_backfill.py
          --date "${{ github.event.inputs.date }}"
          --mode "${{ github.event.inputs.mode }}"
          --game-ids "${{ github.event.inputs.game_ids }}"
          --reset-existing-artifacts "${{ github.event.inputs.reset_existing_artifacts }}"
          --run-community "${{ github.event.inputs.run_community }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE: ${{ secrets.CF_KV_NAMESPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
